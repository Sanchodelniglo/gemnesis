name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rspec

  integration:
    runs-on: ubuntu-latest
    # Gated: only on main pushes (Docker pull is slow)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Pull SGDK image
        run: docker pull ghcr.io/stephane-d/sgdk:latest
      - name: Build sample ROM
        run: |
          # Placeholder — full integration test lands with PLAN-MVP Phase 9
          echo "Integration test stub. Scaffolder + builder not yet implemented."
