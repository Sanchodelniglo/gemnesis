plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "out/**/*"
    - "lessons/**/src/**/*"
    - "lib/gemnesis/templates/**/*"   # user-facing, hands-off
    - "script/**/*"                    # one-off asset generators

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    - "Rakefile"

Metrics/MethodLength:
  Max: 15

Style/Documentation:
  Exclude:
    - "lib/gemnesis.rb"
    - "lib/gemnesis/config.rb"   # reopens Gemnesis module — class-level docs already cover intent

# Specs read better with multiple expectations + setup-heavy examples.
RSpec/MultipleExpectations:
  Max: 8

RSpec/ExampleLength:
  Max: 15

RSpec/MessageSpies:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

# `around` hooks legitimately need instance vars to expose the tmpdir to examples.
RSpec/InstanceVariable:
  Enabled: false

# Integration specs describe a CLI behavior, not a class.
RSpec/DescribeClass:
  Exclude:
    - "spec/integration/**/*"
